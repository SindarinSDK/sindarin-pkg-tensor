name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build-linux:
    name: Build Linux Libraries (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            triplet: x64-linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            triplet: arm64-linux
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build curl zip unzip tar pkg-config

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "$HOME/vcpkg" >> $GITHUB_PATH

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-linux-${{ matrix.arch }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            vcpkg-linux-${{ matrix.arch }}-

      - name: Install ggml via vcpkg overlay port
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          "$VCPKG_ROOT/vcpkg" install --triplet=${{ matrix.triplet }} --x-install-root=vcpkg/installed

      - name: Package libraries
        run: |
          mkdir -p libs/linux/lib libs/linux/include
          find vcpkg/installed/${{ matrix.triplet }}/lib -maxdepth 1 -name "*.a" -exec cp {} libs/linux/lib/ \;
          cp -r vcpkg/installed/${{ matrix.triplet }}/include/* libs/linux/include/
          echo "${{ env.VERSION }}" > libs/linux/VERSION
          echo "linux" > libs/linux/PLATFORM
          ls libs/linux/lib/*.a
          echo "Total libraries: $(ls libs/linux/lib/*.a | wc -l)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libs-linux-${{ matrix.arch }}
          path: libs/linux/
          retention-days: 7

  build-darwin:
    name: Build Darwin Libraries (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: macos-15
            triplet: x64-osx
          - arch: arm64
            runner: macos-latest
            triplet: arm64-osx
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install cmake ninja pkg-config

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "$HOME/vcpkg" >> $GITHUB_PATH

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-darwin-${{ matrix.arch }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            vcpkg-darwin-${{ matrix.arch }}-

      - name: Install ggml via vcpkg overlay port (with Metal feature)
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          # Enable the metal feature on macOS — declared as a manifest-level
          # feature in vcpkg.json so it can be activated in manifest mode
          # via --x-feature. Passing `ggml[metal]` as a positional package
          # argument is rejected by recent vcpkg versions in manifest mode.
          "$VCPKG_ROOT/vcpkg" install --x-feature=metal --triplet=${{ matrix.triplet }} --x-install-root=vcpkg/installed

      - name: Package libraries
        run: |
          mkdir -p libs/darwin/lib libs/darwin/include
          find vcpkg/installed/${{ matrix.triplet }}/lib -maxdepth 1 -name "*.a" -exec cp {} libs/darwin/lib/ \;
          cp -r vcpkg/installed/${{ matrix.triplet }}/include/* libs/darwin/include/
          echo "${{ env.VERSION }}" > libs/darwin/VERSION
          echo "darwin" > libs/darwin/PLATFORM
          ls libs/darwin/lib/*.a
          echo "Total libraries: $(ls libs/darwin/lib/*.a | wc -l)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libs-darwin-${{ matrix.arch }}
          path: libs/darwin/
          retention-days: 7

  build-windows:
    name: Build Windows Libraries
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove system LLVM (conflicts with MinGW)
        run: |
          if (Test-Path "C:\Program Files\LLVM") {
            Remove-Item -Recurse -Force "C:\Program Files\LLVM"
          }
        shell: pwsh

      - name: Cache LLVM-MinGW
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: C:\llvm-mingw
          key: llvm-mingw-20241217

      - name: Install LLVM-MinGW
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20241217/llvm-mingw-20241217-ucrt-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile "llvm-mingw.zip"
          Expand-Archive -Path "llvm-mingw.zip" -DestinationPath "C:\"
          Rename-Item "C:\llvm-mingw-20241217-ucrt-x86_64" "C:\llvm-mingw"
        shell: pwsh

      - name: Add LLVM-MinGW to PATH
        run: echo "C:\llvm-mingw\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install build tools
        run: choco install ninja -y

      - name: Bootstrap vcpkg
        run: |
          if (-not (Test-Path "$env:USERPROFILE\vcpkg")) {
            git clone --depth=1 https://github.com/microsoft/vcpkg.git "$env:USERPROFILE\vcpkg"
            & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          }
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-windows-x64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            vcpkg-windows-x64-

      - name: Install ggml via vcpkg overlay port
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet=x64-mingw-static --x-install-root=vcpkg/installed
        shell: pwsh

      - name: Package libraries
        run: |
          New-Item -ItemType Directory -Force -Path libs/windows/lib, libs/windows/include | Out-Null
          Get-ChildItem vcpkg/installed/x64-mingw-static/lib -Filter "*.a" | Copy-Item -Destination libs/windows/lib/
          Copy-Item -Recurse vcpkg/installed/x64-mingw-static/include/* -Destination libs/windows/include -Force
          "${{ env.VERSION }}" | Out-File libs/windows/VERSION -NoNewline
          "windows" | Out-File libs/windows/PLATFORM -NoNewline
          Get-ChildItem libs/windows/lib/*.a
          Write-Host "Total libraries: $((Get-ChildItem libs/windows/lib/*.a).Count)"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libs-windows
          path: libs/windows/
          retention-days: 7

  create-release:
    name: Create Release
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: libs-linux-x64
          path: libs-linux-x64/

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: libs-linux-arm64
          path: libs-linux-arm64/

      - name: Download Darwin x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: libs-darwin-x64
          path: libs-darwin-x64/

      - name: Download Darwin arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: libs-darwin-arm64
          path: libs-darwin-arm64/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: libs-windows
          path: libs-windows/

      - name: Create archives
        run: |
          tar -czvf "sindarin-tensor-${{ env.VERSION }}-linux-x64.tar.gz" -C libs-linux-x64 .
          tar -czvf "sindarin-tensor-${{ env.VERSION }}-linux-arm64.tar.gz" -C libs-linux-arm64 .
          tar -czvf "sindarin-tensor-${{ env.VERSION }}-darwin-x64.tar.gz" -C libs-darwin-x64 .
          tar -czvf "sindarin-tensor-${{ env.VERSION }}-darwin-arm64.tar.gz" -C libs-darwin-arm64 .
          cd libs-windows && zip -r "../sindarin-tensor-${{ env.VERSION }}-windows-x64.zip" . && cd ..
          echo "Created archives:"
          ls -la *.tar.gz *.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sindarin Tensor ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          draft: false
          generate_release_notes: true
          files: |
            sindarin-tensor-*.tar.gz
            sindarin-tensor-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
