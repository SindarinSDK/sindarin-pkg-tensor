name: Tensor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build curl zip unzip tar pkg-config

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "$HOME/vcpkg" >> $GITHUB_PATH

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-linux-x64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            vcpkg-linux-x64-

      - name: Install ggml via vcpkg overlay port
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          # vcpkg-configuration.json points overlay-ports at ./vcpkg-overlay,
          # which contains the patched ggml port (RealOrko/ggml@sn-pkg-tensor).
          # See docs/issues/ggml-issue.md for the patch background.
          "$VCPKG_ROOT/vcpkg" install --triplet=x64-linux --x-install-root=vcpkg/installed
          echo "Installed packages:"
          ls vcpkg/installed/x64-linux/lib/

      - name: Package libs
        run: |
          mkdir -p libs/linux/lib libs/linux/include
          find vcpkg/installed/x64-linux/lib -maxdepth 1 -name "*.a" -exec cp {} libs/linux/lib/ \;
          cp -r vcpkg/installed/x64-linux/include/* libs/linux/include/
          echo "linux" > libs/linux/PLATFORM
          echo "Packaged libraries:"
          ls libs/linux/lib/

      - name: Install ggml to system paths
        run: |
          sudo cp -r vcpkg/installed/x64-linux/include/* /usr/local/include/
          sudo find vcpkg/installed/x64-linux/lib -maxdepth 1 -name "*.a" -exec cp {} /usr/local/lib/ \;

      - name: Setup Prerequisites
        uses: SindarinSDK/sindarin-pipelines/.github/actions/setup-prereqs@main

      - name: Install Sindarin
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-sindarin@main
        with:
          github-token: ${{ github.token }}

      - name: Install dependencies
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-deps@main
        with:
          github-token: ${{ github.token }}

      - name: Run tests
        run: make test

      - name: Diagnose compile errors
        if: failure()
        uses: SindarinSDK/sindarin-pipelines/.github/actions/diagnose-pkg@main
